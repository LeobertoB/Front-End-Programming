spring:
  datasource:
    url: jdbc:h2:mem:eventhub-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: test-secret-key-with-at-least-thirty-two-characters
    expiration-minutes: 120
  integrations:
    open-meteo-base-url: https://api.open-meteo.test/v1
    rest-countries-base-url: https://rest-countries.test/v3.1
  uploads:
    directory: target/test-uploads
    public-path: /uploads

debug: false

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN
