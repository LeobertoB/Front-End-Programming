spring:
  application:
    name: eventhub-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/eventhub}
    username: ${DATABASE_USERNAME:eventhub}
    password: ${DATABASE_PASSWORD:eventhub}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-key-with-at-least-32-chars}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  integrations:
    open-meteo-base-url: ${OPEN_METEO_BASE_URL:https://api.open-meteo.com/v1}
    rest-countries-base-url: ${REST_COUNTRIES_BASE_URL:https://restcountries.com/v3.1}
  uploads:
    directory: ${UPLOAD_DIRECTORY:uploads}
    public-path: /uploads

debug: false

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN
